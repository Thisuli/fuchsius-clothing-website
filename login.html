<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUCHSIUS - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-logo">
            <img src="images/logo.png" alt="FUCHSIUS Logo" class="logo-img">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">Shop</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- LOGIN SECTION -->
    <section class="auth-section">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your FUCHSIUS account</p>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Email Address">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Password">
            </div>

            <button class="btn-pink full-width">Login</button>

            <p class="auth-switch">
                Don't have an account? 
                <a href="signup.html">Sign up</a>
            </p>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 FUCHSIUS. All rights reserved.</p>
    </footer>

</body>
</html>
